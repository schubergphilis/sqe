# docker-compose.distributed.yml — Full distributed SQE stack
#
# 1 coordinator + 2 workers + Polaris + RustFS (S3)
#
# Usage:
#   docker compose -f docker-compose.distributed.yml up --build -d
#   ./scripts/bootstrap-distributed.sh
#   # Then query via Flight SQL (port 50051) or Trino HTTP (port 8080)
#
# System tables to verify:
#   SELECT * FROM system.runtime.queries ORDER BY created DESC;
#   SELECT * FROM system.runtime.nodes;
#   SELECT * FROM system.runtime.tasks;
#   SELECT * FROM system.metadata.catalogs;

services:
  # ── Infrastructure ──────────────────────────────────────────
  polaris:
    image: apache/polaris:latest
    environment:
      POLARIS_PERSISTENCE_TYPE: in-memory
      POLARIS_BOOTSTRAP_CREDENTIALS: "POLARIS,root,s3cr3t"
      POLARIS_PRODUCTION_READINESS_CHECKS_ENABLED: "false"
      QUARKUS_HTTP_PORT: 8181
      QUARKUS_LOG_LEVEL: INFO
      QUARKUS_LOG_CATEGORY__ORG_APACHE_POLARIS__LEVEL: WARN
      quarkus.otel.sdk.disabled: "true"
      polaris.realm-context.realms: POLARIS
      POLARIS_FEATURES_DEFAULTS_DROP_WITH_PURGE_ENABLED: "true"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: s3admin
      AWS_SECRET_ACCESS_KEY: s3admin
    ports:
      - "18181:8181"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: s3admin
      RUSTFS_SECRET_KEY: s3admin
      RUSTFS_ADDRESS: ":9000"
    ports:
      - "19000:9000"

  # ── SQE Coordinator ────────────────────────────────────────
  coordinator:
    build: .
    entrypoint: ["sqe-server"]
    command: ["/config/coordinator.toml"]
    volumes:
      - ./tests/distributed/coordinator.toml:/config/coordinator.toml:ro
    ports:
      - "50051:50051"   # Flight SQL
      - "8080:8080"     # Trino HTTP
      - "9090:9090"     # Prometheus metrics
    environment:
      RUST_LOG: sqe=info,warn
    depends_on:
      polaris:
        condition: service_healthy
      rustfs:
        condition: service_started

  # ── SQE Worker 1 ───────────────────────────────────────────
  worker-1:
    build: .
    entrypoint: ["sqe-worker"]
    command: ["/config/worker.toml"]
    volumes:
      - ./tests/distributed/worker.toml:/config/worker.toml:ro
    ports:
      - "50061:50052"   # Worker Flight (mapped to avoid conflict)
      - "9091:9091"     # Worker metrics
    environment:
      RUST_LOG: sqe=info,warn
    depends_on:
      - coordinator

  # ── SQE Worker 2 ───────────────────────────────────────────
  worker-2:
    build: .
    entrypoint: ["sqe-worker"]
    command: ["/config/worker.toml"]
    volumes:
      - ./tests/distributed/worker.toml:/config/worker.toml:ro
    ports:
      - "50062:50052"   # Worker Flight (mapped to avoid conflict)
      - "9092:9091"     # Worker metrics
    environment:
      RUST_LOG: sqe=info,warn
    depends_on:
      - coordinator
