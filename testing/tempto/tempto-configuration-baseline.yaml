databases:
  trino:
    host: trino
    port: 8080
    server_address: http://trino:8080
    jdbc_driver_class: io.trino.jdbc.TrinoDriver
    jdbc_url: jdbc:trino://trino:8080/iceberg/default
    jdbc_user: admin
    jdbc_password: ""
    jdbc_pooling: false

tests:
  assert:
    float_tolerance: 0.000001

# Unused, but the product-tests jar registers an LDAP SuiteModuleProvider
# unconditionally; these keys must exist for the Guice injector to build.
ldap:
  admin:
    dn: cn=admin,dc=trino,dc=testldap,dc=com
    password: admin
  url: ldap://ldapserver
