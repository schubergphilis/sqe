[coordinator]
flight_sql_port = 60051
trino_http_port = 18080

[metrics]
prometheus_port = 19090

[auth]
token_endpoint = "http://localhost:18181/api/catalog/v1/oauth/tokens"
client_id = "root"
client_secret = "s3cr3t"

[query]
# Benchmarks load large dimension tables (e.g. customer_demographics: 1.9M rows)
max_result_rows = 0
# SF1 TPC-H/DS queries need more memory for HashJoins on multi-million row tables
max_query_memory = "2GB"
# SF1 CTAS loads can take >5min for large fact tables (store_sales: 2.8M rows)
timeout_secs = 600

[catalog]
polaris_url = "http://localhost:18181/api/catalog"
warehouse = "test_warehouse"

[storage]
s3_endpoint = "http://localhost:19000"
s3_access_key = "s3admin"
s3_secret_key = "s3admin"
s3_region = "us-east-1"
s3_path_style = true
