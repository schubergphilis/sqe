[coordinator]
flight_sql_port = 60051
trino_http_port = 18080
# Memory and spill for SF1 benchmark loads (lineorder: 6M rows, store_sales: 2.8M)
memory_limit = "8GB"
spill_to_disk = true
spill_dir = "/tmp/sqe-bench-spill"
spill_compression = "lz4"

[metrics]
prometheus_port = 19090

[auth]
token_endpoint = "http://localhost:18181/api/catalog/v1/oauth/tokens"
client_id = "root"
client_secret = "s3cr3t"

[query]
# Cap result rows streamed back to the client. The bench occasionally
# hits pathological queries (e.g. TPC-E trade_result at SF1 returns 20M+
# rows from a fact-to-dimension cross product because the generator's
# low-cardinality FK pools force a near-cross product). Collecting that
# into memory OOMs the coordinator. 10M is plenty for every TPC-H /
# TPC-DS / SSB / TPC-C query at SF1, catches real generator bugs loudly,
# and leaves the engine alive for subsequent queries.
max_result_rows = 10_000_000
# SF1 loads need enough memory for large CTAS + HashJoins
max_query_memory = "6GB"
# SF1 CTAS loads can take >5min for large fact tables
timeout_secs = 600

[catalog]
polaris_url = "http://localhost:18181/api/catalog"
warehouse = "test_warehouse"

[storage]
s3_endpoint = "http://localhost:19000"
s3_access_key = "s3admin"
s3_secret_key = "s3admin"
s3_region = "us-east-1"
s3_path_style = true
