# Benchmark config: distributed, 4 workers — coordinator
# Purpose: linear scaling test
[coordinator]
flight_sql_port = 50051
trino_http_port = 8080
memory_limit = "2GB"
spill_to_disk = true
spill_dir = "/tmp/sqe-bench-spill"
spill_compression = "lz4"
worker_urls = ["http://worker-1:50052", "http://worker-2:50052", "http://worker-3:50052", "http://worker-4:50052"]
# Benchmark harness runs in a private docker network; production
# deployments must set worker_secret instead.
allow_unauthenticated_workers = true

[metrics]
prometheus_port = 9090

[auth]
token_endpoint = "http://polaris:8181/api/catalog/v1/oauth/tokens"
client_id = "root"
client_secret = "s3cr3t"

[query]
max_result_rows = 0
timeout_secs = 600

[catalog]
catalog_url = "http://polaris:8181/api/catalog"
warehouse = "test_warehouse"

[storage]
s3_endpoint = "http://rustfs:9000"
s3_access_key = "s3admin"
s3_secret_key = "s3admin"
s3_region = "us-east-1"
s3_path_style = true

[query_cache]
enabled = true
max_memory_mb = 128
ttl_secs = 300
