[coordinator]
flight_sql_port = 60051
trino_http_port = 18080
# Memory ceiling. The previous 8 GB value was sized for SF1 loads and tripped
# OOM on the first TPC-H SF100 hash join (q04's lineitem-orders build side).
# This is a CEILING, not a reservation -- the coordinator only allocates what
# it actually needs. SF1 smoke tests consume a few hundred MiB each; SF100+
# joins need the headroom. Operators running on tight boxes can override via
# `SQE_MEMORY_LIMIT` env var or by supplying a dedicated config.
#
# Known caveat (tracked as followup): per-query memory isn't fully released
# back to the pool between queries, so we need extra headroom to absorb
# cumulative retention across a benchmark sweep. Raising the cap buys time
# until that's fixed.
memory_limit = "64GB"
spill_to_disk = true
spill_dir = "/tmp/sqe-bench-spill"
spill_compression = "lz4"

[metrics]
prometheus_port = 19092

[auth]
token_endpoint = "http://localhost:18181/api/catalog/v1/oauth/tokens"
client_id = "root"
client_secret = "s3cr3t"

[query]
# Cap result rows streamed back to the client. The bench occasionally
# hits pathological queries (e.g. TPC-E trade_result at SF1 returns 20M+
# rows from a fact-to-dimension cross product because the generator's
# low-cardinality FK pools force a near-cross product). Collecting that
# into memory OOMs the coordinator. 10M is plenty for every TPC-H /
# TPC-DS / SSB / TPC-C query at SF1, catches real generator bugs loudly,
# and leaves the engine alive for subsequent queries.
max_result_rows = 10_000_000
# Per-query memory cap. Sized for SF100 TPC-H hash joins; SF1 queries
# never approach this. Operators can tighten via config if running on
# a smaller host.
max_query_memory = "32GB"
# Per-user memory budget (introduced in 382d8d0). Disabled here because
# the test stack is single-tenant and max_query_memory (32GB) exceeds the
# default 1GB cap on every query.
per_user_memory_budget = "0"
# Per-query timeout. SF100 lineitem CTAS + big hash joins can take
# several minutes, and the new 30-minute client timeout (see
# BENCH_CLIENT_TIMEOUT_SECS) gives us headroom to raise this.
timeout_secs = 1800
engine = "ballista"

[catalog]
polaris_url = "http://localhost:18181/api/catalog"
warehouse = "test_warehouse"

[storage]
s3_endpoint = "http://localhost:19000"
s3_access_key = "s3admin"
s3_secret_key = "s3admin"
s3_region = "us-east-1"
s3_path_style = true

# TVF (read_parquet/read_csv) policy. The test stack is single-tenant
# and tests like test_read_parquet_local_file write a tempdir parquet
# and read it back. The PR #10 hardening denies local paths by default
# (SSRF / path-traversal mitigation). Enable explicitly here so the
# feature test runs; production deployments leave the default in place.
[storage.tvf]
allow_local_paths = true

[worker]
coordinator_url = ""
flight_port = 50054
