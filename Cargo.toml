[workspace]
resolver = "2"
members = [
    "crates/sqe-core",
    "crates/sqe-auth",
    "crates/sqe-catalog",
    "crates/sqe-sql",
    "crates/sqe-policy",
    "crates/sqe-planner",
    "crates/sqe-coordinator",
    "crates/sqe-worker",
    "crates/sqe-trino-compat",
    "crates/sqe-metrics",
    "crates/sqe-cli",
]

[workspace.dependencies]
# Query engine — pinned to 51.x for iceberg-datafusion 0.8 compatibility
datafusion = "51"
datafusion-common = "51"
datafusion-expr = "51"
datafusion-sql = "51"
datafusion-proto = "51"

# Arrow — pinned to 57.x for iceberg-datafusion 0.8 compatibility
arrow = { version = "57", features = ["prettyprint"] }
arrow-flight = { version = "57", features = ["flight-sql-experimental"] }
arrow-schema = "57"
arrow-array = "57"
parquet = { version = "57", features = ["async"] }
object_store = { version = "0.12", features = ["aws"] }

# Iceberg
iceberg = "0.8"
iceberg-catalog-rest = "0.8"
iceberg-datafusion = "0.8"

# SQL parser — DataFusion 51 requires ^0.59
sqlparser = "0.59"

# Async — use only what is needed; avoid ["full"] which includes fs/process/io-std
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time", "signal", "net", "io-util"] }

# HTTP
axum = "0.8"
reqwest = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }

# gRPC (Arrow Flight) — arrow-flight 57 requires tonic 0.14
tonic = "0.14"
prost = "0.14"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Concurrency / Caching
dashmap = "6"
moka = { version = "0.12", features = ["future"] }

# Auth
jsonwebtoken = "9"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
prometheus = "0.13"
opentelemetry = "0.31"
opentelemetry_sdk = { version = "0.31", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.31", features = ["grpc-tonic", "trace", "metrics", "logs"] }
tracing-opentelemetry = "0.32"
opentelemetry-appender-tracing = "0.31"

# Error handling
thiserror = "2"
anyhow = "1"

# Misc
async-trait = "0.1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
url = "2"
bytes = "1"
futures = "0.3"

# ── Release profile: fast builds with good runtime performance ─
[profile.release]
codegen-units = 4        # More parallelism during codegen (default=1)
lto = "thin"             # Thin LTO: ~80% of full LTO benefit, much faster link
strip = true             # Strip debug symbols from binary (~50% smaller)
