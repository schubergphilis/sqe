# docker-compose.test.yml — Lightweight test stack (2 containers, no DB/Keycloak)
# Ports are offset by +10000 from production defaults to avoid conflicts.
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   ./scripts/bootstrap-test.sh
#   source tests/.test-env && cargo test -p sqe-coordinator --test integration_test -- --ignored

services:
  polaris:
    image: apache/polaris:1.3.0-incubating
    environment:
      POLARIS_PERSISTENCE_TYPE: in-memory
      POLARIS_BOOTSTRAP_CREDENTIALS: "POLARIS,root,s3cr3t"
      POLARIS_PRODUCTION_READINESS_CHECKS_ENABLED: "false"
      QUARKUS_HTTP_PORT: 8181
      QUARKUS_LOG_LEVEL: INFO
      QUARKUS_LOG_CATEGORY__ORG_APACHE_POLARIS__LEVEL: WARN
      quarkus.otel.sdk.disabled: "true"
      polaris.realm-context.realms: POLARIS
      # Allow DROP VIEW/TABLE to purge metadata files from object storage
      POLARIS_FEATURES_DEFAULTS_DROP_WITH_PURGE_ENABLED: "true"
      # S3 credentials for RustFS — used by Polaris for its own S3 operations
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: s3admin
      AWS_SECRET_ACCESS_KEY: s3admin
      # S3 endpoint override — tells Polaris where RustFS lives
      QUARKUS_S3_ENDPOINT_OVERRIDE: http://rustfs:9000
      QUARKUS_S3_PATH_STYLE_ACCESS: "true"
    ports:
      - "18181:8181"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: s3admin
      RUSTFS_SECRET_KEY: s3admin
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_VOLUMES: /data
    volumes:
      - rustfs-data:/data
    ports:
      - "19000:9000"

volumes:
  rustfs-data:
