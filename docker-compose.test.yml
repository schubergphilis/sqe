# docker-compose.test.yml — Lightweight test stack (2 containers, no DB/Keycloak)
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   ./scripts/bootstrap-test.sh
#   source tests/.test-env && cargo test -p sqe-coordinator --test integration_test -- --ignored

services:
  polaris:
    image: apache/polaris:1.3.0-incubating
    environment:
      POLARIS_PERSISTENCE_TYPE: in-memory
      POLARIS_BOOTSTRAP_CREDENTIALS: "POLARIS,root,s3cr3t"
      POLARIS_PRODUCTION_READINESS_CHECKS_ENABLED: "false"
      QUARKUS_HTTP_PORT: 8181
      QUARKUS_LOG_LEVEL: INFO
      QUARKUS_LOG_CATEGORY__ORG_APACHE_POLARIS__LEVEL: WARN
      # S3 credentials for RustFS (used directly, no STS credential vending)
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: s3admin
      AWS_SECRET_ACCESS_KEY: s3admin
      # Skip STS AssumeRole — use static S3 credentials from env vars
      JAVA_OPTS_APPEND: >-
        -Dpolaris.features.defaults."SKIP_CREDENTIAL_SUBSCOPING_INDIRECTION"=true
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -o /dev/null -X POST http://localhost:8181/api/catalog/v1/oauth/tokens -d grant_type=client_credentials || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: s3admin
      RUSTFS_SECRET_KEY: s3admin
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_VOLUMES: /data
    volumes:
      - rustfs-data:/data
    ports:
      - "9000:9000"

volumes:
  rustfs-data:
