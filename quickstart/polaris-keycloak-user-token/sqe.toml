# SQE config for the Polaris + Keycloak (user token) quickstart.
#
# Difference from the client-id quickstart: SQE does not perform the password
# grant. Clients arrive with a Keycloak-minted bearer token; SQE validates it
# against the realm JWKS and passes it through to Polaris. See README.md.

[coordinator]
flight_sql_port = 50051
trino_http_port = 8080
mode = "hybrid"
flight_compression = "none"

[worker]
memory_limit = "4GB"
spill_dir = "/tmp/sqe-spill"

# ── Authentication ────────────────────────────────────────────────────────
# The legacy block still names the realm; the bearer_token provider below does
# the real work.
[auth]
keycloak_url = "http://keycloak:8080"
realm = "iceberg"
client_id = "sqe-client"
client_secret = ""
ssl_verification = false

# One provider: validate a pre-minted JWT. No username/password, no client
# secret -- SQE never talks to Keycloak's token endpoint. It fetches the realm's
# public signing keys (JWKS) and checks the token's signature, issuer, and
# expiry, then forwards the token to Polaris.
[[auth.providers]]
type = "bearer_token"
jwks_url = "http://keycloak:8080/realms/iceberg/protocol/openid-connect/certs"
issuer = "http://keycloak:8080/realms/iceberg"   # must equal the token's `iss` claim
user_claim = "preferred_username"
roles_claim = "realm_access.roles"
# This sealed Docker network has no external IdP tenants, so accept any token
# this realm signed regardless of its `aud`. For prod, add an audience mapper
# in the realm and set `audience = "sqe"` instead.
allow_unbounded_audience = true
# JWKS is served over plain HTTP by the in-network Keycloak; opt in explicitly
# (newer SQE builds refuse an http jwks_url otherwise).
allow_insecure_jwks = true

# ── Catalog ───────────────────────────────────────────────────────────────
[catalogs.quickstart]
polaris_url = "http://polaris:8181/api/catalog"
warehouse = "quickstart"
metadata_cache_ttl_secs = 30
default_table_format_version = 2

[catalog]
polaris_url = "http://polaris:8181/api/catalog"
warehouse = "quickstart"

# ── Storage ─────────────────────────────────────────────────────────────────
[storage]
s3_endpoint = "http://rustfs:9000"
s3_region = "us-east-1"
s3_access_key = "s3admin"
s3_secret_key = "s3adminpw"
s3_path_style = true
s3_allow_http = true

[policy]
engine = "passthrough"

[session]
idle_timeout_secs = 900

[metrics]
prometheus_port = 9090
