# SQE config for the glue-lake-formation quickstart (reference template).
# Identical to the aws-glue config (glue backend over AWS IAM). The difference
# is operational: the Glue database is created by CloudFormation and governed by
# Lake Formation, and run.sh grants the SQE principal LF permissions explicitly.
#
# run.sh copies this to sqe.toml.local and fills in __WAREHOUSE__ / __REGION__
# from the CDK stack outputs; docker-compose mounts sqe.toml.local. To run by
# hand: `cp sqe.toml sqe.toml.local`, replace the two placeholders with your
# bucket + region, then `docker compose up -d`.
#
# AWS credentials are NOT in this file. They come from the AWS SDK provider
# chain via the container env (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY /
# AWS_REGION), which run.sh resolves from your AWS_PROFILE.

[coordinator]
flight_sql_port = 50051
trino_http_port = 8080
mode = "hybrid"
flight_compression = "none"

[worker]
memory_limit = "4GB"
spill_dir = "/tmp/sqe-spill"

# ── Authentication ────────────────────────────────────────────────────────
# Glue authenticates via AWS IAM (the SDK credential chain), not a user token,
# so there is no IdP here. SQE accepts every connection as a single anonymous
# identity (DEV ONLY -- SQE logs a security warning). For real multi-user auth
# put SQE behind Keycloak (see the polaris-keycloak-* quickstarts); the catalog
# still uses AWS IAM.
[auth]
keycloak_url = ""
realm = ""
client_id = ""
client_secret = ""
ssl_verification = false

[[auth.providers]]
type = "anonymous"
user = "anonymous"
roles = ["admin"]

# ── Catalog: AWS Glue Data Catalog over the AWS SDK ────────────────────────
# The glue backend registers under the legacy SQL catalog name `iceberg`, so
# tables are addressed iceberg.<glue_database>.<table>.
[catalog.backend]
type = "glue"
region = "__REGION__"
warehouse = "__WAREHOUSE__"   # s3://<bucket>/ created by the CDK stack

# Legacy single-catalog block (required by the deserialiser).
[catalog]
polaris_url = "https://placeholder.invalid"   # unused by the glue backend
warehouse = "__WAREHOUSE__"

# ── Storage: real AWS S3 (no endpoint override, virtual-host addressing) ───
[storage]
s3_region = "__REGION__"
s3_path_style = false

[policy]
engine = "passthrough"

[session]
idle_timeout_secs = 900

[metrics]
prometheus_port = 9090
