# SQE quickstart: Unity Catalog OSS (Iceberg REST, read-only).
#
# Unity Catalog (unitycatalog/unitycatalog) exposes an Iceberg REST adapter at
# /api/2.1/unity-catalog/iceberg/. At this version that adapter is READ-ONLY:
# list/load work, create/drop/commit do not (unitycatalog#3). So this quickstart
# connects SQE to Unity and browses the bundled catalog; it does not run DML.
# Auth is disabled in the OSS image, so SQE runs in anonymous mode.
#
#   cp .env.example .env
#   docker compose up -d --wait
#   ./run.sh

services:
  unity:
    image: unitycatalog/unitycatalog:main-2f2e32d
    ports:
      - "${UNITY_PORT:-18181}:8080"
    healthcheck:
      # The Unity OSS image ships wget (no curl). /v1/config always answers when
      # the server is up and requires the warehouse query param.
      test:
        - "CMD-SHELL"
        - "wget -q -O /dev/null 'http://localhost:8080/api/2.1/unity-catalog/iceberg/v1/config?warehouse=unity' || exit 1"
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

  sqe:
    image: ${SQE_IMAGE:-sqe-quickstart:latest}
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["--config", "/etc/sqe/sqe.toml"]
    environment:
      RUST_LOG: "info,sqe_catalog=debug"
    volumes:
      - ./sqe.toml:/etc/sqe/sqe.toml:ro
      - ./queries.sql:/queries.sql:ro
    ports:
      - "${SQE_FLIGHT_PORT:-60051}:50051"
      - "${SQE_TRINO_PORT:-18082}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      unity:
        condition: service_healthy
