# Spark configuration for the spark-parity quickstart.
#
# Catalog: Polaris as Iceberg REST catalog (root service account, client_credentials).
# Masking: Kyuubi RangerSparkExtension reads Ranger `hive` service policies and
#          injects mask_show_last_n expressions before execution.
#
# Spark->Polaris auth: credential=root:<secret>, scope=PRINCIPAL_ROLE:ALL,
#   oauth2-server-uri -> Polaris token endpoint (not Keycloak).
#   Polaris uses the root account for catalog access; masking is Kyuubi's job.
#
# S3 (RustFS): direct static credentials (no vended-credentials delegation).

# ── Iceberg + Kyuubi Authz extensions ────────────────────────────────────────
spark.sql.extensions                                   org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.apache.kyuubi.plugin.spark.authz.ranger.RangerSparkExtension

# ── Iceberg REST catalog (Polaris, root account) ──────────────────────────────
spark.sql.catalog.sales_wh                             org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.sales_wh.catalog-impl                org.apache.iceberg.rest.RESTCatalog
spark.sql.catalog.sales_wh.uri                         http://polaris:8181/api/catalog
spark.sql.catalog.sales_wh.warehouse                   sales_wh
# OAuth2 client_credentials -> Polaris root account
spark.sql.catalog.sales_wh.credential                  root:polaris-root-secret
spark.sql.catalog.sales_wh.oauth2-server-uri           http://polaris:8181/api/catalog/v1/oauth/tokens
spark.sql.catalog.sales_wh.scope                       PRINCIPAL_ROLE:ALL
spark.sql.catalog.sales_wh.token-refresh-enabled       true
# Polaris realm header (required for multi-realm Polaris)
spark.sql.catalog.sales_wh.header.Polaris-Realm        iceberg-ranger
# S3 direct access (static creds; no vended-credentials needed)
spark.sql.catalog.sales_wh.s3.endpoint                 http://rustfs:9000
spark.sql.catalog.sales_wh.s3.path-style-access        true
spark.sql.catalog.sales_wh.s3.access-key-id            s3admin
spark.sql.catalog.sales_wh.s3.secret-access-key        s3adminpw
spark.sql.catalog.sales_wh.io-impl                     org.apache.iceberg.aws.s3.S3FileIO

# ── Hadoop S3A (for low-level file access) ────────────────────────────────────
spark.hadoop.fs.s3a.endpoint                           http://rustfs:9000
spark.hadoop.fs.s3a.path.style.access                 true
spark.hadoop.fs.s3a.access.key                        s3admin
spark.hadoop.fs.s3a.secret.key                        s3adminpw
spark.hadoop.fs.s3a.impl                              org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled            false
spark.hadoop.fs.s3a.aws.credentials.provider          org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# ── Ranger plugin config location ────────────────────────────────────────────
# Kyuubi Authz discovers ranger-spark-security.xml from SPARK_HOME/conf/.
# The spark.sql.extensions above loads RangerSparkExtension which reads that file.
spark.kyuubi.authz.ranger.conf.dir                     /opt/spark/conf

# ── Logging / misc ────────────────────────────────────────────────────────────
spark.sql.defaultCatalog                               sales_wh
spark.driver.extraJavaOptions                          -Dlog4j2.formatMsgNoLookups=true
