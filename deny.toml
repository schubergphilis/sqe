# cargo-deny configuration for SQE
# https://embarkstudios.github.io/cargo-deny/
#
# SUPPLY CHAIN NOTE: Three iceberg crates are sourced from a third-party fork:
#   github.com/risingwavelabs/iceberg-rust.git
#   branch dev_rebase_main_20260303 @ c034b19105fa  (DEP-05: was stale 1978911ec4)
# cargo-deny's advisory database does NOT cover git dependencies.
# The pinned rev mitigates force-push attacks. Verify the SHA matches the
# vendored tree (Cargo.toml:54 / vendor/iceberg-rust/README.md):
#   git ls-remote https://github.com/risingwavelabs/iceberg-rust.git | grep c034b19105fa
# Migration to upstream apache/iceberg-rust planned once OverwriteAction is merged.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # paste (v1.0.15): unmaintained but feature-complete proc macro.
    # Transitive dependency from arrow-flight, datafusion, parquet, tonic.
    # No known vulnerability. Upstream migration pending.
    "RUSTSEC-2024-0436",
    # rsa (v0.9.10): Marvin Attack timing sidechannel (RUSTSEC-2023-0071).
    # NO FIXED UPGRADE EXISTS upstream. Transitive only (AWS SDK / sqlx
    # signing path); SQE performs no RSA private-key decryption on
    # attacker-controlled timing. Re-evaluate when `rsa` ships a fix.
    "RUSTSEC-2023-0071",
    # RUSTSEC-2026-0098/0099/0104 (rustls-webpki 0.101.7) were ignored while the
    # AWS Glue/S3Tables backends used aws-config's legacy hyper-0.14/rustls-0.21
    # connector. Fixed (#133): the vendored glue/s3tables catalogs now build an
    # explicit rustls-0.23 HttpClient, and aws-config/aws-sdk-glue/aws-sdk-s3tables
    # run with `default-features = false`, so the legacy stack (rustls 0.21,
    # webpki 0.101.7, hyper 0.14) is gone from the tree. Ignores removed so the
    # gate catches any regression.
]
