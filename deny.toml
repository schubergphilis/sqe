# cargo-deny configuration for SQE
# https://embarkstudios.github.io/cargo-deny/
#
# SUPPLY CHAIN NOTE: Three iceberg crates are sourced from a third-party fork:
#   github.com/risingwavelabs/iceberg-rust.git
#   branch dev_rebase_main_20260303 @ c034b19105fa  (DEP-05: was stale 1978911ec4)
# cargo-deny's advisory database does NOT cover git dependencies.
# The pinned rev mitigates force-push attacks. Verify the SHA matches the
# vendored tree (Cargo.toml:54 / vendor/iceberg-rust/README.md):
#   git ls-remote https://github.com/risingwavelabs/iceberg-rust.git | grep c034b19105fa
# Migration to upstream apache/iceberg-rust planned once OverwriteAction is merged.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # paste (v1.0.15): unmaintained but feature-complete proc macro.
    # Transitive dependency from arrow-flight, datafusion, parquet, tonic.
    # No known vulnerability. Upstream migration pending.
    "RUSTSEC-2024-0436",
    # rsa (v0.9.10): Marvin Attack timing sidechannel (RUSTSEC-2023-0071).
    # NO FIXED UPGRADE EXISTS upstream. Transitive only (AWS SDK / sqlx
    # signing path); SQE performs no RSA private-key decryption on
    # attacker-controlled timing. Re-evaluate when `rsa` ships a fix.
    "RUSTSEC-2023-0071",
    # rustls-webpki (v0.101.7): three cert-validation advisories
    # (RUSTSEC-2026-0098/0099/0104). SCOPED EXPOSURE: this version is pulled
    # ONLY by the AWS SDK's legacy connector (aws-config default-https-client
    # -> aws-smithy-http-client -> hyper-rustls 0.24 -> rustls 0.21), used by
    # the AWS Glue / S3Tables catalog backends. SQE's primary Polaris REST
    # path already runs patched rustls 0.23 / webpki 0.103.13 (also in-tree).
    #
    # DEP-06: enabling `glue` / `s3tables` (only in Dockerfile.full /
    # --features glue,s3tables images) links a COMPLETE second, legacy
    # TLS+HTTP stack: rustls 0.21 / rustls-webpki 0.101.7 (the three advisories
    # below) / hyper 0.14 / h2 0.3 / http 0.2. It is a live cert-validation
    # exposure in the full image plus the single largest source of
    # duplicate-major-version bloat. The fix (build an explicit modern
    # hyper-1 / rustls-0.23 HttpClient for the vendored iceberg Glue/S3Tables
    # backends so aws-config stops selecting the legacy connector, then drop
    # these three ignores) is tracked in GitLab issue (DEP-06) and deferred
    # here -- do NOT swap the AWS connector in the correctness bucket.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
]
