# cargo-deny configuration for SQE
# https://embarkstudios.github.io/cargo-deny/
#
# SUPPLY CHAIN NOTE: Three iceberg crates are sourced from a third-party fork:
#   github.com/risingwavelabs/iceberg-rust.git
#   branch dev_rebase_main_20260303 @ c034b19105fa  (DEP-05: was stale 1978911ec4)
# cargo-deny's advisory database does NOT cover git dependencies.
# The pinned rev mitigates force-push attacks. Verify the SHA matches the
# vendored tree (Cargo.toml:54 / vendor/iceberg-rust/README.md):
#   git ls-remote https://github.com/risingwavelabs/iceberg-rust.git | grep c034b19105fa
# Migration to upstream apache/iceberg-rust planned once OverwriteAction is merged.

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # paste (v1.0.15): unmaintained but feature-complete proc macro.
    # Transitive dependency from arrow-flight, datafusion, parquet, tonic.
    # No known vulnerability. Upstream migration pending.
    "RUSTSEC-2024-0436",
    # IMPORTANT: cargo-deny and cargo-audit do NOT agree on every advisory, so
    # this list intentionally differs from `.cargo/audit.toml`:
    #   - RUSTSEC-2023-0071 (rsa Marvin attack) is NOT listed here. cargo-deny
    #     does not match it against rsa 0.9.10 (advisory-not-detected), so an
    #     ignore would be an unused-ignore warning. cargo-audit DOES raise it as
    #     a vulnerability, so it is ignored in audit.toml only.
    #   - RUSTSEC-2026-0173 (proc-macro-error2, unmaintained) is likewise not
    #     matched by cargo-deny and is only a non-failing unmaintained warning in
    #     cargo-audit, so it is not ignored in either tool's hard gate.
    # RUSTSEC-2026-0098/0099/0104 (rustls-webpki 0.101.7) were ignored while the
    # AWS Glue/S3Tables backends used aws-config's legacy hyper-0.14/rustls-0.21
    # connector. Fixed (#133): the vendored glue/s3tables catalogs now build an
    # explicit rustls-0.23 HttpClient, and aws-config/aws-sdk-glue/aws-sdk-s3tables
    # run with `default-features = false`, so the legacy stack (rustls 0.21,
    # webpki 0.101.7, hyper 0.14) is gone from the tree. Ignores removed so the
    # gate catches any regression.
    # quick-xml (0.37.5/0.38.4/0.39.4): high-severity XML-parsing DoS advisories
    # fixed in >=0.41.0. Transitive only -- object_store 0.13.2 pins
    # `quick-xml ^0.39.0` (S3/GCS list + multipart XML) and the AWS SDK pulls the
    # older lines. The fix is unreachable (object_store 0.13.2 rejects 0.41; no
    # newer object_store in the escrow registry). SQE parses XML only from its
    # configured object store / catalog (trusted infra), never attacker input, so
    # the DoS needs a malicious storage backend. Drop when object_store bumps
    # quick-xml past 0.41. Matched by cargo-deny too (version-range match).
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]
