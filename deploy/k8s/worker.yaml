apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqe-worker
  labels:
    app: sqe
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sqe
      component: worker
  template:
    metadata:
      labels:
        app: sqe
        component: worker
    spec:
      containers:
        - name: sqe
          image: sqe:latest
          args: ["--config", "/etc/sqe/sqe.toml"]
          env:
            - name: SQE_MODE
              value: "worker"
            - name: SQE_COORDINATOR_ADDR
              value: "sqe-coordinator:50051"
          ports:
            - name: flight
              containerPort: 50052
            - name: metrics
              containerPort: 9090
            - name: health
              containerPort: 9091
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/sqe
              readOnly: true
          resources:
            requests:
              memory: "1Gi"
              cpu: "1"
            limits:
              memory: "8Gi"
              cpu: "4"
      volumes:
        - name: config
          configMap:
            name: sqe-config
