apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqe-coordinator
  labels:
    app: sqe
    component: coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sqe
      component: coordinator
  template:
    metadata:
      labels:
        app: sqe
        component: coordinator
    spec:
      containers:
        - name: sqe
          image: sqe:latest
          args: ["--config", "/etc/sqe/sqe.toml"]
          env:
            - name: SQE_MODE
              value: "coordinator"
          ports:
            - name: flight-sql
              containerPort: 50051
            - name: trino-http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
            - name: health
              containerPort: 9091
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/sqe
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
      volumes:
        - name: config
          configMap:
            name: sqe-config
