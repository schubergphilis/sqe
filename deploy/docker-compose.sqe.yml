# SQE overlay for the Chameleon quickstart stack.
#
# Usage (from quickstart/full/):
#   docker compose -f docker-compose.yml -f ../../sql-engine/deploy/docker-compose.sqe.yml up -d
#
# This replaces Trino with SQE. To run both side-by-side, remove the
# trino override at the bottom.

services:
  # ── SQE Coordinator ────────────────────────────────────────
  sqe:
    build:
      context: ../../sql-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["--config", "/etc/sqe/sqe.toml"]
    ports:
      - "50051:50051"    # Flight SQL
    environment:
      TZ: Europe/Amsterdam
      # Auth — Keycloak (same realm as Trino/Spark)
      SQE_AUTH__KEYCLOAK_URL: "https://auth.local"
      SQE_AUTH__REALM: "iceberg"
      SQE_AUTH__CLIENT_ID: "sqe-client"
      SQE_AUTH__CLIENT_SECRET: "${SQE_CLIENT_SECRET:-sqe-secret-change-me}"
      SQE_AUTH__SSL_VERIFICATION: "false"
      # Catalog — Polaris
      SQE_CATALOG__POLARIS_URL: "http://polaris:8181/api/catalog"
      SQE_CATALOG__WAREHOUSE: "main_warehouse"
      SQE_CATALOG__DEFAULT_TABLE_FORMAT_VERSION: "2"
      # Storage — S3 (same as Polaris/Spark)
      SQE_STORAGE__S3_ENDPOINT: "http://s3:9000"
      SQE_STORAGE__S3_REGION: "us-east-1"
      SQE_STORAGE__S3_ACCESS_KEY: "${S3_ACCESS_KEY:-s3admin}"
      SQE_STORAGE__S3_SECRET_KEY: "${S3_SECRET_KEY:-s3admin}"
      SQE_STORAGE__S3_PATH_STYLE: "true"
      # Metrics / Observability
      SQE_METRICS__OTLP_ENDPOINT: "http://jaeger:4317"
      SQE_METRICS__PROMETHEUS_PORT: "9090"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    mem_limit: 2g
    cpus: 2.0
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      polaris:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      keycloak-config:
        condition: service_completed_successfully
      polaris-bootstrap:
        condition: service_completed_successfully
    networks:
      - polaris-net

  # ── Backend: switch from Trino to SQE ──────────────────────
  # Override backend env to point at SQE instead of Trino.
  # The backend uses Trino HTTP protocol, which SQE supports on :8080.
  backend:
    environment:
      # Replace Trino connection with SQE Trino-compat endpoint
      TRINO_HOST: sqe
      TRINO_PORT: "8080"
      TRINO_HTTP_SCHEME: "http"
      TRINO_VERIFY_SSL: "false"
      TRINO_CATALOG: "main_warehouse"
      DEFAULT_QUERY_ENGINE: "trino"
      TRINO_ENABLED: "true"
    depends_on:
      sqe:
        condition: service_healthy

  # ── Disable Trino ──────────────────────────────────────────
  # Scale to 0 to prevent Trino from starting.
  # Remove this block to run both Trino and SQE side-by-side.
  trino:
    deploy:
      replicas: 0
