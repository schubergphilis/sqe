image:
  repository: sqe
  # DEP-08: leave `tag` empty so it resolves to the chart appVersion (a
  # concrete version, currently 0.1.0) via the `sqe.image` helper, instead of
  # the floating `latest` (non-reproducible: two installs a day apart could run
  # different binaries with no record, and IfNotPresent never re-pulls a cached
  # `latest`). For production, pin by digest:
  #   tag: "0.1.0@sha256:<digest>"
  # and keep pullPolicy: IfNotPresent (safe for an immutable digest).
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ── Coordinator ─────────────────────────────────────────────
coordinator:
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2"
  # DEP-01: optional sizeLimit for the writable /tmp emptyDir (spill + session
  # files). Leave empty for node-default; set e.g. "1Gi" to bound spill usage.
  spillVolumeSizeLimit: ""
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ── Workers ─────────────────────────────────────────────────
worker:
  enabled: false
  replicas: 2
  resources:
    requests:
      memory: "1Gi"
      cpu: "1"
    limits:
      memory: "8Gi"
      cpu: "4"
  # DEP-01: optional sizeLimit for the writable /tmp emptyDir (spill files).
  spillVolumeSizeLimit: ""
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ── PodDisruptionBudget + spreading (ISSUE-249) ─────────────
# A node drain or rolling upgrade can otherwise evict every worker and the
# coordinator at once. Default scheduling can also pack all workers onto one
# node, so a single node failure takes the whole tier down.
podDisruptionBudget:
  enabled: true
  # The coordinator is a single replica today (ISSUE-221: process-local session
  # and query state, no shared store). minAvailable: 1 keeps a voluntary drain
  # from evicting the only coordinator without an operator decision. With
  # replicas: 1 this blocks an unforced drain by design; cordon + delete the
  # pod, or scale to 0 first, when you must move it. It does NOT provide HA.
  coordinator:
    minAvailable: 1
  # Workers are stateless and replicated. maxUnavailable: 1 lets a drain roll
  # through one node at a time while keeping the rest serving fragments.
  worker:
    maxUnavailable: 1

# When affinity is left empty for a component, the chart applies a default
# preferred podAntiAffinity by hostname so replicas spread across nodes. We
# chose podAntiAffinity over topologySpreadConstraints because it slots into
# the existing per-component `affinity` passthrough: set `affinity` on a
# component to override the default entirely. Set this to false to render no
# affinity at all when you leave `affinity` empty.
defaultAntiAffinity: true

# ── Service ─────────────────────────────────────────────────
service:
  type: ClusterIP
  flightSqlPort: 50051
  trinoHttpPort: 8080
  metricsPort: 9090

# ── SQE Configuration (renders to sqe.toml) ────────────────
config:
  coordinator:
    flight_sql_port: 50051
    trino_http_port: 8080
    mode: "hybrid"
    # DEP-02: keep below coordinator.resources.limits.memory (2Gi) so spill
    # fires before the kernel OOMKills the pod. ~70-75% of 2Gi.
    memory_limit: "1500MB"
    spill_to_disk: true
    # DEP-01: spill dir lives under the writable /tmp emptyDir mounted on the
    # coordinator pod.
    spill_dir: "/tmp/sqe-coordinator-spill"

  worker:
    heartbeat_interval_secs: 5
    # DEP-02: ~75% of worker.resources.limits.memory (8Gi) leaves headroom for
    # Arrow buffers outside DataFusion's accounted pool. An 8GB engine limit in
    # an 8Gi pod leaves zero headroom and OOMKills under load.
    memory_limit: "6GB"
    spill_dir: "/tmp/sqe-spill"

  auth:
    keycloak_url: "https://keycloak.example.com"
    realm: "iceberg"
    client_id: "sqe-client"
    # client_secret: set via secret or env override
    token_refresh_buffer_secs: 60
    ssl_verification: true

  catalog:
    catalog_url: "http://polaris:8181/api/catalog"
    warehouse: "iceberg"
    metadata_cache_ttl_secs: 30

  storage:
    s3_endpoint: "http://s3:9000"
    s3_region: "us-east-1"
    s3_path_style: true
    # s3_access_key / s3_secret_key: set via secret or env override

  policy:
    engine: "passthrough"

  metrics:
    prometheus_port: 9090
    otlp_endpoint: ""
    # ISSUE-248: audit_log_path is NOT set here. The path is derived from the
    # audit.* block below so the mounted volume and the rendered toml stay in
    # lockstep (audit.path + audit.fileName). Setting it here would let the
    # config drift from the mount and write audit records to a path that has no
    # durable volume behind it.

# -- Audit log (ISSUE-248) ----------------------------------------------------
# The coordinator writes security-relevant audit records (one JSONL entry per
# statement) to audit_log_path. Two problems were fixed here:
#   1. off by default -- audit_log_path was empty, so the logger was a no-op.
#   2. non-durable -- the only writable mount was the /tmp emptyDir, so any
#      records written were lost on pod restart or reschedule.
#
# Workers do not audit (the coordinator owns auth, policy, and statement
# routing), so the audit volume is mounted on the coordinator only.
#
# Default posture: audit is ENABLED so a security trail exists out of the box,
# but persistence is OFF so a plain `helm install` does not require a
# PersistentVolume to be provisioned. With persistence off the records live on
# the same emptyDir as spill and are still ephemeral.
#
# FOR PRODUCTION set audit.persistence.enabled=true (or point existingClaim at
# a PVC you manage). The chart then mounts a ReadWriteOnce PVC at audit.path and
# the records survive pod restarts. RWO is single-writer, which matches the
# single-replica coordinator (ISSUE-221).
audit:
  # Master switch. When false, audit_log_path renders empty and the logger is a
  # no-op; no audit volume is mounted.
  enabled: true
  # Directory the audit log lives in. A volume (PVC or emptyDir) is mounted
  # here, and audit_log_path becomes "<path>/<fileName>".
  path: "/var/log/sqe/audit"
  # File name under audit.path.
  fileName: "audit.jsonl"
  persistence:
    # When true, back audit.path with a PersistentVolumeClaim instead of an
    # emptyDir, so audit records survive pod restart and reschedule. When false
    # (default), audit.path is an emptyDir and records are ephemeral.
    enabled: false
    # Name of a PVC you manage. When set, the chart mounts it instead of
    # creating one (persistence.enabled is still required to mount a PVC at all).
    existingClaim: ""
    # Size of the PVC the chart creates (ignored when existingClaim is set).
    size: "1Gi"
    # StorageClass for the created PVC. Empty uses the cluster default.
    storageClass: ""
    # Access mode for the created PVC. RWO matches the single coordinator.
    accessMode: "ReadWriteOnce"

# ── Worker secret (distributed mode) ────────────────────────
# ISSUE-218: in distributed mode the engine HARD-FAILS startup validation when
# a coordinator_url / worker_urls is set with an empty worker_secret. The
# shared secret authenticates worker registration and credential push, so the
# chart does not template it inline by default. You MUST set it when
# worker.enabled=true. The same value is injected into both the coordinator
# (SQE_COORDINATOR__WORKER_SECRET) and the workers (SQE_WORKER__WORKER_SECRET);
# they must match for a worker to register.
#
# In single-node mode (worker.enabled=false) the chart renders neither
# worker_urls nor coordinator_url, so no secret is required and a plain
# `helm install` starts cleanly.
#
# Provide the secret one of two ways, mirroring the S3/OIDC secret story below:
#   1. existingSecret (preferred): point at a Secret you manage and name the
#      key holding the shared secret.
#   2. value: inline string. A Secret is created for you. Fine for dev/test;
#      avoid in production (ends up in `helm get values`).
workerSecret:
  # Name of an existing Secret holding the shared worker secret. Leave empty to
  # fall back to `value` (which creates a Secret).
  existingSecret: ""
  # Key inside the Secret that holds the shared secret.
  key: "SQE_WORKER_SECRET"
  # Inline value. Only used when existingSecret is empty. Leave empty in
  # single-node mode.
  value: ""

# ── Secrets (mounted as env var overrides) ──────────────────
# Reference an existing K8s Secret containing sensitive config.
# Keys should match SQE env var names, e.g.:
#   SQE_AUTH__CLIENT_SECRET
#   SQE_STORAGE__S3_ACCESS_KEY
#   SQE_STORAGE__S3_SECRET_KEY
existingSecret: ""

# Or provide values inline (a Secret will be created):
secrets: {}
  # SQE_AUTH__CLIENT_SECRET: "my-secret"
  # SQE_STORAGE__S3_ACCESS_KEY: "minioadmin"
  # SQE_STORAGE__S3_SECRET_KEY: "minioadmin"

# ── Extra env vars ──────────────────────────────────────────
extraEnv: []
  # - name: RUST_LOG
  #   value: "info"

# ── Health probes ───────────────────────────────────────────
healthPort: 9091
livenessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10
readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 5

# ── Graceful shutdown (issue #250) ──────────────────────────
# On SIGTERM the process flips /readyz to NOT-ready so the Service stops
# routing new work, waits coordinator.shutdown_drain_secs (config default 25s),
# then shuts the Flight server down. Keep terminationGracePeriodSeconds well
# above shutdown_drain_secs so the process drains and exits cleanly before the
# kubelet sends SIGKILL. Long-running analytical queries may need a larger
# value than the k8s default of 30s.
terminationGracePeriodSeconds: 90

# ── ServiceMonitor (Prometheus Operator) ────────────────────
serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}
