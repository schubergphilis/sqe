apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sqe.fullname" . }}-coordinator
  labels:
    {{- include "sqe.labels" . | nindent 4 }}
    app.kubernetes.io/component: coordinator
spec:
  replicas: {{ .Values.coordinator.replicas }}
  selector:
    matchLabels:
      {{- include "sqe.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: coordinator
  template:
    metadata:
      labels:
        {{- include "sqe.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: coordinator
      annotations:
        checksum/config: {{ include (print .Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.coordinator.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: sqe
          image: {{ include "sqe.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["--mode", "coordinator", "--config", "/etc/sqe/sqe.toml"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            {{- if or .Values.secrets .Values.existingSecret }}
            - name: SQE_AUTH__CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "sqe.fullname" .)) }}
                  key: SQE_AUTH__CLIENT_SECRET
                  optional: true
            - name: SQE_STORAGE__S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "sqe.fullname" .)) }}
                  key: SQE_STORAGE__S3_ACCESS_KEY
                  optional: true
            - name: SQE_STORAGE__S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "sqe.fullname" .)) }}
                  key: SQE_STORAGE__S3_SECRET_KEY
                  optional: true
            {{- end }}
            {{- if and .Values.worker.enabled (include "sqe.workerSecretConfigured" .) }}
            # ISSUE-218: both pods mount the same ConfigMap, whose toml carries
            # both worker_urls and coordinator_url in distributed mode. The
            # engine's global validate() runs both guards on both pods, so the
            # coordinator must satisfy the worker.worker_secret guard too. Inject
            # both keys from one Secret; the values must match.
            - name: SQE_COORDINATOR__WORKER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "sqe.workerSecretName" . }}
                  key: {{ .Values.workerSecret.key }}
            - name: SQE_WORKER__WORKER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "sqe.workerSecretName" . }}
                  key: {{ .Values.workerSecret.key }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: flight-sql
              containerPort: {{ .Values.config.coordinator.flight_sql_port }}
            - name: trino-http
              containerPort: {{ .Values.config.coordinator.trino_http_port }}
            - name: metrics
              containerPort: {{ .Values.config.metrics.prometheus_port }}
            - name: health
              containerPort: {{ .Values.healthPort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          volumeMounts:
            - name: config
              mountPath: /etc/sqe
              readOnly: true
            # DEP-01: with readOnlyRootFilesystem the whole FS (incl. /tmp) is
            # unwritable, but the engine spills and persists sessions under
            # /tmp by default. Mount a writable emptyDir at /tmp so spill-to-disk
            # (the OOM defense) works without dropping readOnlyRootFilesystem.
            - name: tmp
              mountPath: /tmp
            {{- if .Values.audit.enabled }}
            # ISSUE-248: audit records go to a dedicated volume so they are not
            # lost on pod restart. With audit.persistence.enabled the volume is
            # a durable PVC; otherwise it is an emptyDir (functional but
            # ephemeral). The rendered audit_log_path (configmap.yaml) is a file
            # under this mount, so the engine writes here under
            # readOnlyRootFilesystem.
            - name: audit
              mountPath: {{ .Values.audit.path | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.coordinator.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "sqe.fullname" . }}-config
        - name: tmp
          emptyDir:
            {{- with .Values.coordinator.spillVolumeSizeLimit }}
            sizeLimit: {{ . }}
            {{- end }}
        {{- if .Values.audit.enabled }}
        # ISSUE-248: durable audit storage when persistence is on, ephemeral
        # emptyDir otherwise. existingClaim mounts a PVC you manage; a non-empty
        # persistence.enabled without existingClaim binds the chart-created PVC
        # (see audit-pvc.yaml).
        - name: audit
          {{- if .Values.audit.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.audit.persistence.existingClaim | default (printf "%s-audit" (include "sqe.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      {{- with .Values.coordinator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.coordinator.affinity }}
      affinity:
        {{- toYaml .Values.coordinator.affinity | nindent 8 }}
      {{- else if and .Values.defaultAntiAffinity (gt (int .Values.coordinator.replicas) 1) }}
      # ISSUE-249: default spread for multi-replica coordinators. Single-replica
      # coordinators (the default) get no anti-affinity: there is nothing to
      # spread, and a required rule would wedge scheduling on a one-node cluster.
      affinity:
        {{- include "sqe.defaultAntiAffinity" (dict "ctx" $ "component" "coordinator") | nindent 8 }}
      {{- end }}
      {{- with .Values.coordinator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
