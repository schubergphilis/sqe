{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sqe.fullname" . }}-secrets
  labels:
    {{- include "sqe.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- if and .Values.workerSecret.value (not .Values.workerSecret.existingSecret) }}
---
# ISSUE-218: chart-managed Secret for the shared worker secret, created from
# workerSecret.value. Prefer workerSecret.existingSecret in production.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sqe.fullname" . }}-worker-secret
  labels:
    {{- include "sqe.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.workerSecret.key }}: {{ .Values.workerSecret.value | quote }}
{{- end }}
