# Minimal stub of apache/iceberg-rust's iceberg_test_utils crate.
# The upstream crate wires up Docker Compose harnesses and logging.
# SQE only needs the `tests` feature to unlock ignored-by-default
# tests in the iceberg crate. Nothing else is consumed.

[package]
name = "iceberg_test_utils"
version = "0.8.0"
edition = "2024"
publish = false
license = "Apache-2.0"

[features]
tests = []

[lib]
path = "src/lib.rs"
