[package]
edition = { workspace = true }
homepage = { workspace = true }
name = "iceberg-catalog-loader"
rust-version = { workspace = true }
version = { workspace = true }

categories = ["database"]
description = "Apache Iceberg Catalog Loader API"
keywords = ["iceberg", "catalog"]
license = { workspace = true }
repository = { workspace = true }

# SQE patch: backends are gated behind cargo features so a slim build
# (e.g. `--no-default-features --features rest`) does not pull in the
# AWS SDK, Thrift, or sqlx weight transitively. Upstream loader has
# all backends always-on; this patch is part of the open vendor-refresh
# discussion in `vendor/iceberg-rust/README.md`.
[features]
default = ["rest", "glue", "s3tables", "hms", "sql"]
rest = []
glue = ["dep:iceberg-catalog-glue"]
s3tables = ["dep:iceberg-catalog-s3tables"]
hms = ["dep:iceberg-catalog-hms"]
sql = ["dep:iceberg-catalog-sql"]

[dependencies]
iceberg = { workspace = true }
iceberg-catalog-rest = { workspace = true }
iceberg-catalog-glue = { workspace = true, optional = true }
iceberg-catalog-s3tables = { workspace = true, optional = true }
iceberg-catalog-hms = { workspace = true, optional = true }
iceberg-catalog-sql = { workspace = true, optional = true }
tokio = { workspace = true }
async-trait = { workspace = true }

[dev-dependencies]
sqlx = { workspace = true, features = ["runtime-tokio", "sqlite", "migrate"] }
tempfile = { workspace = true }
