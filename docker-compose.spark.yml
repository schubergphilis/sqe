# docker-compose.spark.yml -- Spark 4.x overlay for cross-engine Iceberg interop.
#
# Use as an overlay on top of docker-compose.test.yml so Spark shares the
# same Polaris REST catalog and RustFS S3 store SQE writes against. That
# way a table created by SQE is visible to Spark without any copy step.
#
# Usage:
#   docker compose -f docker-compose.test.yml -f docker-compose.spark.yml up -d
#   ./scripts/start-spark-interop.sh   # wait for readiness
#   ./scripts/spark-interop.sh "SELECT COUNT(*) FROM rest.test_ns.t"
#
# Service: spark-iceberg
#   - Runs spark-connect-server on port 15002 so external clients can submit
#     SQL. The interop script uses `docker exec` with spark-sql instead,
#     which avoids needing a Connect client and keeps the test harness
#     stateless across invocations.
#   - iceberg-spark-runtime 1.7.1 matches the V2 / V3 spec surface that
#     iceberg-rust 0.8 implements. Bump both in lock-step on upgrade.
#   - Reads S3 via rustfs using path-style access and the same s3admin
#     credentials docker-compose.test.yml bootstraps into Polaris.

services:
  spark-iceberg:
    image: apache/spark:4.0.0
    container_name: sqe-spark-iceberg
    depends_on:
      polaris:
        condition: service_healthy
      rustfs:
        condition: service_started
    environment:
      # S3 creds used by the Iceberg REST catalog's vended S3 client.
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: s3admin
      AWS_SECRET_ACCESS_KEY: s3admin
      # Keep Spark's JVM small. The interop test touches at most a few KB.
      SPARK_DRIVER_MEMORY: 1g
      SPARK_EXECUTOR_MEMORY: 1g
    # Spark 4.x ships without a bundled Iceberg runtime. --packages pulls
    # iceberg-spark-runtime and the hadoop-aws bundle on container start.
    # The jars land under /root/.ivy2/jars and persist in the named volume
    # so restarts do not re-download. Port 15002 is Spark Connect; we also
    # expose 4040 for the Spark UI if operators need to debug a query.
    command:
      - bash
      - -c
      - |
        mkdir -p /opt/spark/conf
        cat >/opt/spark/conf/spark-defaults.conf <<'CONF'
        spark.jars.packages                                 org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.7.1,org.apache.hadoop:hadoop-aws:3.4.1,software.amazon.awssdk:bundle:2.29.26
        spark.sql.extensions                                org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
        spark.sql.catalog.rest                              org.apache.iceberg.spark.SparkCatalog
        spark.sql.catalog.rest.type                         rest
        spark.sql.catalog.rest.uri                          http://polaris:8181/api/catalog
        spark.sql.catalog.rest.warehouse                    test_warehouse
        spark.sql.catalog.rest.credential                   root:s3cr3t
        spark.sql.catalog.rest.scope                        PRINCIPAL_ROLE:ALL
        spark.sql.catalog.rest.header.X-Iceberg-Access-Delegation vended-credentials
        spark.sql.catalog.rest.s3.endpoint                  http://rustfs:9000
        spark.sql.catalog.rest.s3.path-style-access         true
        spark.sql.catalog.rest.io-impl                      org.apache.iceberg.aws.s3.S3FileIO
        spark.sql.defaultCatalog                            rest
        spark.hadoop.fs.s3a.endpoint                        http://rustfs:9000
        spark.hadoop.fs.s3a.path.style.access               true
        spark.hadoop.fs.s3a.access.key                      s3admin
        spark.hadoop.fs.s3a.secret.key                      s3admin
        spark.hadoop.fs.s3a.aws.credentials.provider        org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider
        CONF
        # Keep the container alive. The interop harness drives SQL via
        # `docker exec ... spark-sql`, not Connect, so we only need a
        # long-running process. `tail -f /dev/null` works and uses no CPU.
        exec tail -f /dev/null
    ports:
      - "14040:4040"
      - "15002:15002"
    volumes:
      - spark-ivy:/root/.ivy2
    healthcheck:
      # Ready once spark-sql can start a session. The first invocation
      # downloads Iceberg + hadoop-aws jars via --packages; subsequent runs
      # hit the ivy cache and return in under two seconds.
      test:
        - CMD-SHELL
        - /opt/spark/bin/spark-sql --conf spark.ui.enabled=false -e 'SELECT 1' >/dev/null 2>&1
      interval: 15s
      timeout: 120s
      retries: 20
      start_period: 90s

volumes:
  spark-ivy:
