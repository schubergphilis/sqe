# .cargo/config.toml — workspace-level Cargo configuration
#
# Applied for both local development and Docker builds.

[build]
# Pipelined compilation: starts compiling a crate as soon as its metadata is
# ready, without waiting for the full preceding crate to finish.
pipelining = true

# ── Local development (macOS) ─────────────────────────────────────────────
# On macOS, use lld via Apple's llvm-15+ if available (brew install llvm).
# Uncomment and adjust the path if you have LLVM installed:
# [target.aarch64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/opt/llvm/bin/ld64.lld"]

# ── Linux / Docker builds ─────────────────────────────────────────────────
# The Dockerfile already sets RUSTFLAGS for mold; this section acts as
# fallback for CI or bare-metal Linux builders without that env var.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "linker=clang", "-C", "link-arg=-fuse-ld=mold"]

# ── Release profile additions ─────────────────────────────────────────────
# codegen-units, lto, strip are set in the workspace Cargo.toml [profile.release].
