# .cargo/config.toml — workspace-level Cargo configuration
#
# Applied for both local development and Docker builds.

[build]
# Pipelined compilation: starts compiling a crate as soon as its metadata is
# ready, without waiting for the full preceding crate to finish.
pipelining = true
# Force-disable any user-level rustc-wrapper (sccache) for this repo. Measured
# 2026-06-12: 30 hits / 957 misses (3%) — on a Defender-scanned Mac every miss
# writes artifacts to both target/ and the sccache dir and gets scanned twice.
# The empty string overrides ~/.cargo/config.toml's rustc-wrapper.
rustc-wrapper = ""
# Pin target directory to prevent parallel agents from creating duplicate
# build artifacts (which can balloon to 100GB+).
target-dir = "target"
# Cap parallel compile jobs. On a 16 GB Apple Silicon (5P+6E), running all
# 11 cores plus DataFusion/arrow/iceberg-rust link units in parallel pushes
# memory over the swap threshold and makes the system unusable during the
# build. On a 32 GB+ machine memory is not the constraint, so we stay on the
# performance cores plus two efficiency cores: wall-clock is roughly halved
# versus `jobs = 4` on a full cold build, and peak RSS stays under 20 GB.
# On a 16 GB machine, drop this back to 4 (or set `CARGO_BUILD_JOBS=4`).
# Override per-invocation with `cargo build -j N` or `CARGO_BUILD_JOBS=N`.
jobs = 8
# sccache was tried here and made things worse on Defender-scanned Macs:
# every cache miss writes artifacts to BOTH target/ and
# ~/Library/Caches/Mozilla.sccache, doubling the file surface Defender
# scans. With IT-managed exclusions unavailable, the wrapper adds pure
# overhead. Keep sccache installed for occasional `RUSTC_WRAPPER=sccache
# cargo build` experiments, but leave it off by default.

# ── Local development (macOS) ─────────────────────────────────────────────
# mold does NOT support macOS native linking (Mach-O format).
# `ld64.lld` is LLVM's Mach-O linker. It links large Rust debug binaries
# roughly 2-3x faster than Apple's default ld64. Prerequisite:
#   brew install lld
# This installs `/opt/homebrew/bin/ld64.lld` (much smaller than the full
# `brew install llvm` formula). If the binary is missing on a teammate's
# machine the link step will fail with a clear "linker not found" error;
# comment this block out locally if you cannot install lld.
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/bin/ld64.lld"]

# ── Linux / Docker builds ─────────────────────────────────────────────────
# The Dockerfile already sets RUSTFLAGS for mold; this section acts as
# fallback for CI or bare-metal Linux builders without that env var.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "linker=clang", "-C", "link-arg=-fuse-ld=mold"]

# ── Release profile additions ─────────────────────────────────────────────
# codegen-units, lto, strip are set in the workspace Cargo.toml [profile.release].

# ── xtask alias ───────────────────────────────────────────────────────────
# `cargo xtask <subcommand>` is the convention for repo-local dev tooling.
# See `xtask/` crate for available subcommands (e.g., `cargo xtask matrix-report`).
[alias]
xtask = "run --package xtask --"
