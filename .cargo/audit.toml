# cargo-audit configuration for SQE.
#
# The CI `check` stage runs bare `cargo audit`, which (unlike `cargo deny`)
# does NOT read deny.toml, so advisory ignores are configured here separately.
#
# NOTE: cargo-audit and cargo-deny do NOT raise the same set of advisories, so
# this list is intentionally NOT identical to deny.toml `[advisories] ignore`:
#
# - RUSTSEC-2023-0071 (rsa Marvin attack): cargo-audit raises this as a hard
#   vulnerability against rsa 0.9.10 (transitive via sqlx-mysql), so it MUST be
#   ignored here or the gate fails. cargo-deny does not match it, so it is NOT
#   in deny.toml. No fixed rsa upgrade exists upstream; SQE performs no RSA
#   private-key decryption on attacker-controlled timing (transitive signing
#   path only). Re-evaluate when `rsa` ships a fix.
# - RUSTSEC-2024-0436 (paste v1.0.15): unmaintained proc macro, transitive from
#   arrow-flight/datafusion/parquet/tonic. No known vulnerability.
#
# RUSTSEC-2026-0098/0099/0104 (rustls-webpki 0.101.7) were removed in #133:
# the AWS Glue/S3Tables catalogs now use an explicit rustls-0.23 HttpClient, so
# the legacy connector (rustls 0.21 / webpki 0.101.7 / hyper 0.14) is gone from
# the tree and the advisories no longer apply.
[advisories]
ignore = [
    "RUSTSEC-2023-0071",
    "RUSTSEC-2024-0436",
]
