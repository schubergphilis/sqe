# docker-compose.observability.yml — Lightweight observability for benchmarks
#
# VictoriaMetrics (single-binary Prometheus replacement, ~30MB RAM)
# + Grafana with pre-configured SQE dashboard (~50MB RAM)
#
# Usage:
#   docker compose -f docker-compose.test.yml -f docker-compose.observability.yml up -d
#   Open http://localhost:13000 (Grafana, admin/admin)
#
# Works alongside any SQE config (single-node or distributed).
# Scrapes metrics from:
#   - Coordinator: localhost:19090 (single-node) or localhost:29090 (distributed)
#   - Workers: localhost:29091-29094 (distributed)

services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.117.1
    command:
      - "-promscrape.config=/etc/prometheus/scrape.yml"
      - "-retentionPeriod=7d"
      - "-httpListenAddr=:8428"
    volumes:
      - ./deploy/observability/scrape.yml:/etc/prometheus/scrape.yml:ro
      - vm-data:/victoria-metrics-data
    ports:
      - "18428:8428"   # VictoriaMetrics UI + API
    mem_limit: 128m

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/sqe-benchmark.json
    volumes:
      - ./deploy/observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/default.yml:ro
      - ./deploy/observability/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/default.yml:ro
      - ./deploy/observability/sqe-benchmark-dashboard.json:/var/lib/grafana/dashboards/sqe-benchmark.json:ro
    ports:
      - "13000:3000"   # Grafana UI
    mem_limit: 128m
    depends_on:
      - victoriametrics

volumes:
  vm-data:
