# Roadmap page authored copy.
# Curated + sanitized from the SQE roadmap / status log: no account ids, regions,
# branch names, MR numbers, or internal paths. The ${matrix.score.*} placeholders
# stay data-driven (sourced from the synced iceberg matrix); HTML tags (<code>)
# preserved verbatim.

# Current-state snapshot.
state:
  - num: "${matrix.score.percent}%"
    label: "Iceberg matrix (${matrix.score.raw}/${matrix.score.max}), top five"
  - num: 6/7
    label: benchmark suites won vs Trino 465
  - num: 222/222
    label: queries pass at SF1
  - num: 43/43
    label: security audit findings resolved

# Recent milestones, newest first.
milestones:
  - date: Jun 2026
    title: Read-only ops web UI
    body: "A network-gated dashboard ships inside the coordinator binary, live queries with per-fragment timing, cluster workers, and engine metrics with 12h history (sparklines, gauges, a query-activity histogram). No login, no build step, no external assets."
  - date: May 2026
    title: One distributed engine
    body: "After driving an Apache Ballista integration to functional parity and measuring it honestly, slower where it completed, couldn't finish the TPC-DS analytical core, we removed it. The bespoke scheduler (weighted placement, scan locality, straggler handling) is the only distributed engine."
  - date: May 2026
    title: Security & correctness audit
    body: "A multi-wave audit campaign hardened the stack: a sealed secret type, per-user session isolation and cache keying, policy correctness on DELETE/UPDATE, write-path cleanup on cancel, and constant-time credential checks. Every audit finding resolved."
  - date: May 2026
    title: DuckDB-class embedded mode
    body: "File-format table functions (read_parquet / csv / json / avro), <code>SELECT * FROM 'file'</code> auto-detect, <code>COPY … TO</code>, a Delta Lake reader, and HuggingFace <code>hf://</code> URLs. The embedded persona that turned out DuckDB-shaped."
  - date: May 2026
    title: Column-level lineage
    body: "A native OpenLineage 2-0-2 emitter with column-level lineage on writes. File and HTTP sinks, disk-spool fallback for collector outages. Off by default."
  - date: Apr 2026
    title: Five catalogs, live-verified
    body: "Apache Polaris, Project Nessie, Unity Catalog OSS, AWS Glue, and AWS S3 Tables, each behind live integration tests. AWS SigV4 support added to the vendored REST catalog for federated endpoints."
  - date: Apr 2026
    title: Runtime filter pushdown
    body: "DataFusion 53 runtime filters from hash-join build sides now feed the Iceberg scan's row-group, page-index, and row-filter pruning, double-digit TPC-H speedups at SF1 and SF10."
  - date: Apr 2026
    title: DataFusion 53.1 + vendored Iceberg fork
    body: "~40x faster planning, hash-join dynamic filters, and three filter-pushdown fixes. A vendored iceberg-rust fork rebased on DataFusion 53 with a SigV4 feature for federated REST."
  - date: Q1-Q2 2026
    title: "Iceberg matrix: 52% -> 88.4%"
    body: "Phased coverage work lifted the public Iceberg matrix score from a 52% baseline to ${matrix.score.percent}% (${matrix.score.raw}/${matrix.score.max}), V3 features end to end, partition evolution, merge-on-read deletes, bloom filters, and live catalog verification."

# Open roadmap. Items already shipped (OPA/Cedar policy, Azure/GCS stores,
# map-producing UDAFs) are intentionally NOT listed, since they're done.
roadmap:
  progress:
    - t: "HuggingFace glob (<code>hf://…/**/*.parquet</code>)"
      d: A custom object store so globs enumerate files via the HF tree API and the SQL pre-rewriter retires.
    - t: Copy-on-write DML at TPC-E SF100
      d: Parallelise per-file rewrite + streaming writes to keep the heaviest update under the harness cap.
    - t: Snowflake Horizon catalog, live test
      d: REST-compatible today; a live integration test against a real Horizon endpoint is the open item.
    - t: Helm chart for Kubernetes
      d: A first-class chart for the coordinator + worker topology.
  planned:
    - t: Local data-file block cache
      d: Alluxio-style caching of hot data files on workers.
    - t: Iceberg Puffin bloom-filter reading
      d: Use Puffin sidecar bloom filters for additional scan pruning.
    - t: Sort-on-write enforcement
      d: A writer pass that physically sorts files to the table's sort order, not just the metadata.
    - t: Smart-CSV byte sampling
      d: Sample bytes to infer delimiter/quote/header, beyond today's extension heuristics.
    - t: Semantic AI layer
      d: RDF/SPARQL, property-graph, and vector-search surfaces over the same engine.
  blocked:
    - t: Iceberg V3 Variant & shredded Variant
      d: Blocked upstream in iceberg-rust / arrow-rs.
    - t: Iceberg V3 Geometry types
      d: Needs a DataFusion user-defined type.
    - t: Iceberg V3 Vector / Embedding types
      d: Spec not finalised.
    - t: Iceberg V3 row lineage
      d: Deferred upstream.
    - t: Multi-argument partition transforms (V3)
      d: Spec not stable.
