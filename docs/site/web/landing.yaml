# SF1 benchmark suite vs Trino 465 (README).
bench:
  - suite: TPC-H (22)
    sqe: 16.8s
    trino: 26.7s
    speedup: 1.6x
    pass: 22/22
    win: true
  - suite: SSB (13)
    sqe: 8.3s
    trino: 5.8s
    speedup: 0.70x slower
    pass: 13/13
    win: false
  - suite: TPC-DS (99)
    sqe: 13.4s
    trino: 45.6s
    speedup: 3.4x
    pass: 93/99
    win: true
  - suite: TPC-C (8 read)
    sqe: 0.41s
    trino: 2.65s
    speedup: 6.5x
    pass: 8/8
    win: true
  - suite: TPC-E (11)
    sqe: 9.3s
    trino: 172.0s
    speedup: 18.5x
    pass: 11/11
    win: true
  - suite: TPC-BB (10)
    sqe: 28.0s
    trino: 255.7s
    speedup: 9.1x
    pass: 10/10
    win: true
  - suite: ClickBench (43)
    sqe: 1.3s
    trino: 4.46s
    speedup: 3.4x
    pass: 43/43
    win: true
