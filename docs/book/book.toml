[book]
title = "SQE — Sovereign Query Engine"
authors = ["VPF Data & AI"]
language = "en"
src = "src"

[build]
build-dir = "../../target/book"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/schuberg/sqe"
additional-css = []
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[preprocessor.mermaid]
command = "mdbook-mermaid"

[output.html.fold]
enable = true
level = 1
