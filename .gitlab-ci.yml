include:
  - project: 'vpf-data-ai/libraries/ci-cd-pipelines/build-publish-docker-images'
    ref: main
    file: '.gitlab-ci-template.yml'
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - check
  - test
  - secret-detection
  - discover
  - trigger
  - build

variables:
  BUILD_ENGINE: "kaniko"
  SECRET_DETECTION_ENABLED: 'true'

secret_detection:
  stage: secret-detection

# ── Static analysis + security ─────────────────────────────────
cargo-check:
  stage: check
  image: rust:bookworm
  before_script:
    # `clang` + `mold` are required because .cargo/config.toml pins them as
    # the linker for x86_64-unknown-linux-gnu builds (faster link than GNU
    # ld). The rust:bookworm image ships neither, so without this we fail
    # at link time with `linker `clang` not found`.
    - apt-get update -qq && apt-get install -y -qq cmake protobuf-compiler libssl-dev pkg-config clang mold > /dev/null
    # The `rust:bookworm` image ships without clippy or cargo-audit for the
    # 1.92 toolchain; install them explicitly so the script stage has the
    # binaries it expects. cargo-deny was already being installed this way;
    # same pattern for the rest.
    - rustup component add clippy
    # DEP-09: install only when missing (cached in .cargo/bin across runs), and
    # do NOT swallow install failures — a failed install must fail the job, not
    # silently skip the `cargo audit` / `cargo deny` security gate below.
    - command -v cargo-audit > /dev/null || cargo install cargo-audit --quiet
    - command -v cargo-deny > /dev/null || cargo install cargo-deny --quiet
  script:
    - cargo clippy --all-targets --all-features -- -D warnings
    - cargo audit
    - cargo deny check advisories
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - crates/**/*
        - Cargo.toml
        - Cargo.lock
        - deny.toml
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      changes:
        - crates/**/*
        - Cargo.toml
        - Cargo.lock
        - deny.toml
  cache:
    key: cargo-check-${CI_COMMIT_REF_SLUG}
    # Warm-start a new branch from main's cache instead of compiling the whole
    # dependency tree cold on first push; cargo recompiles only what changed.
    fallback_keys:
      - cargo-check-main
    paths:
      - target/
      - .cargo/registry/
      # DEP-09: cache the whole bin dir so cargo-audit is not recompiled every run.
      - .cargo/bin/

# ── Tests ──────────────────────────────────────────────────────
cargo-test:
  stage: test
  image: rust:bookworm
  before_script:
    # `clang` + `mold` are required because .cargo/config.toml pins them as
    # the linker for x86_64-unknown-linux-gnu builds (faster link than GNU
    # ld). The rust:bookworm image ships neither, so without this we fail
    # at link time with `linker `clang` not found`.
    - apt-get update -qq && apt-get install -y -qq cmake protobuf-compiler libssl-dev pkg-config clang mold > /dev/null
  script:
    # Debug, not --release. Tests need correctness, not query speed. The
    # release profile's thin-LTO + opt-level 3 over the arrow / DataFusion /
    # iceberg dependency tree dominates this job's wall time, while the test
    # suite itself runs in well under a minute. Debug compiles far faster and
    # additionally enables overflow-check assertions. Representative perf
    # numbers come from the benchmark jobs, not from the test job.
    - cargo test
    # Run the SQLite-backed runtime catalog tests behind the explicit
    # feature flag so unrelated workspace builds do not silently pick up
    # the SQLite driver via feature unification.
    - cargo test -p sqe-coordinator --features test-sqlite --test runtime_catalog_test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - crates/**/*
        - Cargo.toml
        - Cargo.lock
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      changes:
        - crates/**/*
        - Cargo.toml
        - Cargo.lock
  cache:
    key: cargo-${CI_COMMIT_REF_SLUG}
    # Warm-start a new branch from main's cache instead of compiling the whole
    # dependency tree cold on first push; cargo then recompiles only what
    # actually changed.
    fallback_keys:
      - cargo-main
    paths:
      - target/
      - .cargo/registry/

# ── Feature subset check ───────────────────────────────────────
# Default CI runs --all-features only. A #[cfg(feature = "hms")] block
# can rot for months while CI stays green because the default-features
# build keeps it hot. Issue #113. Each axis below is the documented
# slim build path users actually take.
cargo-check-features:
  stage: check
  image: rust:bookworm
  before_script:
    # `clang` + `mold` are required because .cargo/config.toml pins them as
    # the linker for x86_64-unknown-linux-gnu builds (faster link than GNU
    # ld). The rust:bookworm image ships neither, so without this we fail
    # at link time with `linker `clang` not found`.
    - apt-get update -qq && apt-get install -y -qq cmake protobuf-compiler libssl-dev pkg-config clang mold > /dev/null
  script:
    # Slimmest REST-only build. The documented minimum.
    - cargo check -p sqe-catalog --no-default-features --features rest
    # AWS-heavy axis kept hot so glue + s3tables share aws-config.
    - cargo check -p sqe-catalog --no-default-features --features rest,glue,s3tables
    # HMS-only axis (Thrift weight without the AWS SDK).
    - cargo check -p sqe-catalog --no-default-features --features rest,hms
    # SQL catalog axes (PostgreSQL and SQLite split for tls-rustls reasons).
    - cargo check -p sqe-catalog --no-default-features --features rest,sql-postgres
    - cargo check -p sqe-catalog --no-default-features --features rest,sql-sqlite
    # Delta read add-on. Slim REST + delta is the embedded mode build.
    - cargo check -p sqe-catalog --no-default-features --features rest,delta
    # No-features sanity check. Compiles, even if no backend is wired.
    - cargo check -p sqe-catalog --no-default-features
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - crates/sqe-catalog/**/*
        - Cargo.toml
        - Cargo.lock
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      changes:
        - crates/sqe-catalog/**/*
        - Cargo.toml
        - Cargo.lock
  cache:
    key: cargo-features-${CI_COMMIT_REF_SLUG}
    fallback_keys:
      - cargo-features-main
    paths:
      - target/
      - .cargo/registry/

# ── Integration tests (Docker stack required) ─────────────────
# Runs the 118 #[ignore] tests gated on docker-compose.test.yml. These
# cover Iceberg V3 types, partition evolution, MoR delete, CTAS round-
# trip, Trino HTTP, and distributed dispatch. CI used to never run them
# (issue #93), so a regression in the hardest-to-test paths shipped
# without being challenged. Default trigger: scheduled pipelines and
# the merge-to-main push. Manual trigger available on MR pipelines.
integration-test:
  stage: test
  image: docker:24
  # docker-in-docker. The job's `docker compose up` against
  # docker-compose.test.yml needs a real Docker daemon, which the sibling
  # `docker:24-dind` service provides. Explicit `alias: docker` ensures the
  # DNS name the job container connects to (`tcp://docker:2375`) lines up
  # with the service hostname regardless of GitLab Runner version, and
  # `--tls=false --host=tcp://0.0.0.0:2375` makes dind listen on the
  # non-TLS port instead of the default TLS-only :2376. Without the
  # explicit command the daemon binds to 2376 with self-signed certs and
  # the job hits `Cannot connect to the Docker daemon at tcp://docker:2375`.
  services:
    - name: docker:24-dind
      alias: docker
      command: ["--tls=false", "--host=tcp://0.0.0.0:2375"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    # `clang` + `mold` mirror the rust:bookworm jobs above: .cargo/config.toml
    # pins them as the Linux linker, so the Alpine-based integration job must
    # install them as well. `mold` lives in the community repo (on by default
    # in docker:24's apk index).
    - apk add --no-cache bash curl docker-compose rust cargo cmake protobuf-dev openssl-dev pkgconfig clang mold
  script:
    - ./scripts/integration-test.sh
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
  cache:
    key: cargo-integration-${CI_COMMIT_REF_SLUG}
    fallback_keys:
      - cargo-integration-main
    paths:
      - target/
      - .cargo/registry/
  timeout: 1h

# ── Iceberg matrix score regression guard ─────────────────────
# Runs `cargo xtask matrix-report --min-percent N` where N is the current
# baseline. If the committed docs/iceberg-matrix-state.json drops below the
# baseline, the job fails. Bump MATRIX_MIN_PERCENT when a phase lands.
matrix-score:
  stage: check
  image: rust:bookworm
  before_script:
    # `clang` + `mold` are required because .cargo/config.toml pins them as
    # the linker for x86_64-unknown-linux-gnu builds (faster link than GNU
    # ld). The rust:bookworm image ships neither, so without this we fail
    # at link time with `linker `clang` not found`.
    - apt-get update -qq && apt-get install -y -qq cmake protobuf-compiler libssl-dev pkg-config clang mold > /dev/null
  script:
    - cargo xtask matrix-report --min-percent $MATRIX_MIN_PERCENT
  variables:
    # Baseline updated per phase tag. Current: Phase A-G integrated at 50.8%.
    # Phase H target: 55%. Deferred follow-ups (HMS/Glue real, CDC query_handler,
    # rewrite_data_files Parquet re-encoding) move this to ~60%.
    MATRIX_MIN_PERCENT: "50"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - docs/iceberg-matrix-state.json
        - xtask/**/*
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      changes:
        - docs/iceberg-matrix-state.json
        - xtask/**/*
  cache:
    key: xtask-${CI_COMMIT_REF_SLUG}
    fallback_keys:
      - xtask-main
    paths:
      - target/
      - .cargo/registry/

# ── Container builds ───────────────────────────────────────────

# Disable template default job — we define our own below
build-kaniko:
  rules:
    - when: never

build-sqe:
  extends: .kaniko-build
  stage: build
  variables:
    DOCKERFILE_PATH: 'Dockerfile'
    BUILD_CONTEXT: '.'
    IMAGE_NAME: 'sqe'
    BUILD_ARGS: >-
      VERSION=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}
      BUILD_DATE=${CI_PIPELINE_CREATED_AT}
      GIT_REVISION=${CI_COMMIT_SHA}
  # Build the production image only after merge to main, not on every MR.
  # The MR pipeline already runs cargo-check + cargo-test; building the full
  # kaniko image on each MR is expensive and redundant. A Dockerfile or crate
  # change still rebuilds the image here on the merge-to-main push.
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      changes:
        - crates/**/*
        - Cargo.toml
        - Cargo.lock
        - Dockerfile

# ── Release pipeline (triggered on tag push: v*) ──────────────

changelog:
  stage: test
  image: rust:bookworm
  script:
    - cargo install git-cliff 2>/dev/null || true
    - git-cliff --latest --output release-notes.md
  artifacts:
    paths:
      - release-notes.md
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+/'

release:
  stage: build
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: changelog
      artifacts: true
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: ${CI_COMMIT_TAG}
    name: "SQE ${CI_COMMIT_TAG}"
    description: release-notes.md
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+/'
