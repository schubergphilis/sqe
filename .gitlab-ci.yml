include:
  - project: 'vpf-data-ai/libraries/ci-cd-pipelines/build-publish-docker-images'
    ref: main
    file: '.gitlab-ci-template.yml'
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - test
  - secret-detection
  - discover
  - trigger
  - build

variables:
  BUILD_ENGINE: "kaniko"
  SECRET_DETECTION_ENABLED: 'true'

secret_detection:
  stage: secret-detection

# ── Tests ──────────────────────────────────────────────────────
cargo-test:
  stage: test
  image: rust:bookworm
  before_script:
    - apt-get update -qq && apt-get install -y -qq cmake protobuf-compiler libssl-dev pkg-config > /dev/null
  script:
    - cargo test --release
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - crates/**/*
        - Cargo.toml
        - Cargo.lock
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      changes:
        - crates/**/*
        - Cargo.toml
        - Cargo.lock
  cache:
    key: cargo-${CI_COMMIT_REF_SLUG}
    paths:
      - target/
      - .cargo/registry/

# ── Container builds ───────────────────────────────────────────

# Disable template default job — we define our own below
build-kaniko:
  rules:
    - when: never

build-sqe:
  extends: .kaniko-build
  stage: build
  variables:
    DOCKERFILE_PATH: 'Dockerfile'
    BUILD_CONTEXT: '.'
    IMAGE_NAME: 'sqe'
    BUILD_ARGS: >-
      VERSION=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}
      BUILD_DATE=${CI_PIPELINE_CREATED_AT}
      GIT_REVISION=${CI_COMMIT_SHA}
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - crates/**/*
        - Cargo.toml
        - Cargo.lock
        - Dockerfile
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
      changes:
        - crates/**/*
        - Cargo.toml
        - Cargo.lock
        - Dockerfile
