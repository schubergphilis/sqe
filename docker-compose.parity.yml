# Parity overlay: run SQE single-node for the SQE-vs-Trino parity harness.
# docker-compose.compare.yml mounts the distributed coordinator.toml (which
# expects worker-1/worker-2). This overlay swaps in a single-node config so SQE
# boots standalone against the shared Polaris catalog.
#
# Layer after test + compare:
#   docker compose -f docker-compose.test.yml -f docker-compose.compare.yml \
#                  -f docker-compose.parity.yml up -d rustfs polaris sqe trino
services:
  sqe:
    volumes:
      - ./tests/parity/coordinator-parity.toml:/etc/sqe/config.toml:ro
