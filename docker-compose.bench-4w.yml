# docker-compose.bench-4w.yml — 4-worker benchmark stack
#
# Extends docker-compose.test.yml with coordinator + 4 workers.
# Usage:
#   docker compose -f docker-compose.test.yml -f docker-compose.bench-4w.yml up --build -d

services:
  coordinator:
    build: .
    entrypoint: ["sqe-server", "/config/coordinator.toml"]
    volumes:
      - ./tests/benchmark-matrix/distributed-4w-coordinator.toml:/config/coordinator.toml:ro
    ports:
      - "60051:50051"   # Flight SQL
      - "28080:8080"    # Trino HTTP
      - "29090:9090"    # Prometheus metrics
    environment:
      RUST_LOG: sqe=info,warn
    depends_on:
      polaris:
        condition: service_healthy
      rustfs:
        condition: service_started

  worker-1:
    build: .
    entrypoint: ["sqe-worker", "/config/worker.toml"]
    volumes:
      - ./tests/benchmark-matrix/distributed-4w-worker.toml:/config/worker.toml:ro
    ports:
      - "60061:50052"   # Worker 1 Flight
      - "29091:9091"    # Worker 1 metrics
    environment:
      RUST_LOG: sqe=info,warn
    depends_on:
      - coordinator

  worker-2:
    build: .
    entrypoint: ["sqe-worker", "/config/worker.toml"]
    volumes:
      - ./tests/benchmark-matrix/distributed-4w-worker.toml:/config/worker.toml:ro
    ports:
      - "60062:50052"   # Worker 2 Flight
      - "29092:9091"    # Worker 2 metrics
    environment:
      RUST_LOG: sqe=info,warn
    depends_on:
      - coordinator

  worker-3:
    build: .
    entrypoint: ["sqe-worker", "/config/worker.toml"]
    volumes:
      - ./tests/benchmark-matrix/distributed-4w-worker.toml:/config/worker.toml:ro
    ports:
      - "60063:50052"   # Worker 3 Flight
      - "29093:9091"    # Worker 3 metrics
    environment:
      RUST_LOG: sqe=info,warn
    depends_on:
      - coordinator

  worker-4:
    build: .
    entrypoint: ["sqe-worker", "/config/worker.toml"]
    volumes:
      - ./tests/benchmark-matrix/distributed-4w-worker.toml:/config/worker.toml:ro
    ports:
      - "60064:50052"   # Worker 4 Flight
      - "29094:9091"    # Worker 4 metrics
    environment:
      RUST_LOG: sqe=info,warn
    depends_on:
      - coordinator
